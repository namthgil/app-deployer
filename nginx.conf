worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;

    # Deployer UI + API (Node on port 4200)
    upstream deployer {
        server 127.0.0.1:4200;
    }

    server {
        listen 80;
        server_name _;

        # Deployer UI at root (exact match wins)
        location = / {
            proxy_pass http://deployer/;
        }

        # Deployer API — GET is open, mutating methods require Basic Auth
        location ^~ /api/ {
            limit_except GET HEAD {
                auth_basic "App Deployer";
                auth_basic_user_file /etc/nginx/htpasswd;
            }
            proxy_pass http://deployer/api/;
            client_max_body_size 10M;
        }

        # Each app: /appname or /appname/path → /var/www/apps/appname/...
        location ~ ^/(?<app>[a-zA-Z0-9_-]+)(?<rest>/.*)?$ {
            root /var/www/apps;
            try_files /$app$rest /$app$rest/index.html /$app/index.html =404;
        }
    }
}
